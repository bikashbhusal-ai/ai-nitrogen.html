<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Laboratory Preparation of Nitrogen Gas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f6fc;font-family:'Segoe UI',sans-serif;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
svg{width:100vw;height:100vh;display:block}
@keyframes bubble{0%{transform:translateY(0);opacity:.75}100%{transform:translateY(-38px);opacity:0}}
@keyframes drop{0%{transform:translateY(0);opacity:1}100%{transform:translateY(20px);opacity:0}}
@keyframes f1{0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(1.13) scaleY(.89)}}
@keyframes f2{0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(.9) scaleY(1.1)}}
@keyframes rise{0%{transform:translateY(0);opacity:.7}100%{transform:translateY(-38px);opacity:0}}
@keyframes flowgas{0%{stroke-dashoffset:120}100%{stroke-dashoffset:0}}
@keyframes gp{0%,100%{opacity:.15}50%{opacity:.3}}
.bbl{animation:bubble 1.7s ease-out infinite}
.drp{animation:drop 1.1s ease-in infinite}
.f1{transform-origin:50% 100%;animation:f1 .55s ease-in-out infinite}
.f2{transform-origin:50% 100%;animation:f2 .7s ease-in-out infinite .1s}
.gsr{animation:rise 2s ease-out infinite}
.flw{stroke-dasharray:7 4;animation:flowgas 1.8s linear infinite}
.glw{animation:gp 2.5s ease-in-out infinite}
</style>
</head>
